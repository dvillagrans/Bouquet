<!DOCTYPE html>
<html lang="es">
<head>

<link rel="stylesheet" href="tokens.css" />

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>

<script type="text/babel" src="variant-super.jsx"></script>

<script type="text/babel" data-presets="react">
const App = () => (
  <DesignCanvas
    title="Bouquet · Dashboards"
    subtitle="Operativo (cadena/zona) + Control (super-admin)"
  >
    <DCSection id="super" title="Super-admin · vista global del sistema">
      <DCArtboard id="super" label="Bouquet Control · god view" width={1440} height={900}>
        <VariantSuper />
      </DCArtboard>
    </DCSection>
    <DCSection id="dashboard" title="Dashboard del local · cadena / zona">
      <DCArtboard id="a-v2" label="A · Operativo dark · editorial" width={1440} height={900}>
        <VariantA />
      </DCArtboard>
    </DCSection>
  </DesignCanvas>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
